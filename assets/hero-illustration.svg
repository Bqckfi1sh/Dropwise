    <circle cx="36" cy="156" r="8" fill="#4ade80" opacity="0.1"/>
    <text x="36" y="159" font-family="sans-serif" font-size="8" fill="#4ade80" text-anchor="middle">☀</text>
    <text x="52" y="154" font-family="sans-serif" font-size="8" font-weight="600" fill="#fff" opacity="0.7">Skip Today</text>
