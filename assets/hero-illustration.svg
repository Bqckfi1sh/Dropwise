    <circle cx="36" cy="216" r="8" fill="#4ade80" opacity="0.1"/>
    <text x="36" y="219" font-family="sans-serif" font-size="8" fill="#4ade80" text-anchor="middle">🌿</text>
    <text x="52" y="214" font-family="sans-serif" font-size="8" font-weight="600" fill="#fff" opacity="0.7">In 2 Days</text>
    <text x="52" y="226" font-family="sans-serif" font-size="6.5" fill="#888">Herbs — 1.0 gal</text>

