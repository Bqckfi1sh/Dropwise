    <text x="42" y="286" font-family="sans-serif" font-size="4.5" fill="#4ade80" text-anchor="middle" opacity="0.5">Home</text>
    <text x="85" y="286" font-family="sans-serif" font-size="4.5" fill="#888" text-anchor="middle">Garden</text>
