<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <rect width="1000" height="600" fill="#0a0a0a"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="600" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M24 34 C21.5 40 16 42.5 16 47.5 C16 51.9 19.6 55.5 24 55.5 C28.4 55.5 32 51.9 32 47.5 C32 42.5 27.5 40 24 34Z" fill="#4ade80" opacity="0.8"/>
  <text x="42" y="50" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff">Dropwise</text>
  <!-- Nav -->
  <rect x="12" y="80" width="176" height="36" rx="8" fill="#4ade80" opacity="0.1"/>
  <text x="44" y="103" font-family="sans-serif" font-size="12" font-weight="600" fill="#4ade80">Dashboard</text>
  <text x="44" y="148" font-family="sans-serif" font-size="12" fill="#666">My Garden</text>
  <text x="44" y="190" font-family="sans-serif" font-size="12" fill="#666">Schedule</text>
  <text x="44" y="232" font-family="sans-serif" font-size="12" fill="#666">Statistics</text>
  <text x="44" y="274" font-family="sans-serif" font-size="12" fill="#666">Settings</text>
  <!-- Weather widget -->
  <rect x="12" y="340" width="176" height="80" rx="8" fill="#161616" stroke="#4ade80" stroke-width="0.5" opacity="0.4"/>
  <text x="28" y="364" font-family="sans-serif" font-size="8" fill="#888">Weather - Austin, TX</text>
  <text x="28" y="395" font-family="sans-serif" font-size="28" font-weight="700" fill="#fff">87F</text>
  <text x="108" y="385" font-family="sans-serif" font-size="18" fill="#4ade80">Sunny</text>
  <text x="28" y="412" font-family="sans-serif" font-size="8" fill="#888">Humidity 45%</text>
  <!-- Header -->
  <line x1="200" y1="60" x2="1000" y2="60" stroke="#1a1a1a" stroke-width="1"/>
  <text x="230" y="38" font-family="sans-serif" font-size="18" font-weight="700" fill="#fff">Good morning, gardener</text>
  <text x="900" y="35" font-family="sans-serif" font-size="10" fill="#888">Jul 5, 2026</text>
  <circle cx="970" cy="30" r="16" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/>
  <text x="970" y="35" font-family="sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">BF</text>
  <!-- Stat cards -->
  <rect x="220" y="80" width="240" height="100" rx="10" fill="#161616" stroke="#4ade80" stroke-width="0.5" opacity="0.5"/>
  <text x="240" y="105" font-family="sans-serif" font-size="10" fill="#888">Water Today</text>
  <text x="240" y="138" font-family="sans-serif" font-size="28" font-weight="700" fill="#4ade80">5.5 gal</text>
  <text x="240" y="158" font-family="sans-serif" font-size="9" fill="#888">3 plants need water</text>
  <rect x="480" y="80" width="240" height="100" rx="10" fill="#161616" stroke="#4ade80" stroke-width="0.3" opacity="0.4"/>
  <text x="500" y="105" font-family="sans-serif" font-size="10" fill="#888">Saved This Month</text>
  <text x="500" y="138" font-family="sans-serif" font-size="28" font-weight="700" fill="#4ade80">$47</text>
  <text x="500" y="158" font-family="sans-serif" font-size="9" fill="#888">320 gallons saved</text>
  <rect x="740" y="80" width="240" height="100" rx="10" fill="#161616" stroke="#4ade80" stroke-width="0.3" opacity="0.4"/>
  <text x="760" y="105" font-family="sans-serif" font-size="10" fill="#888">Watering Streak</text>
  <text x="760" y="138" font-family="sans-serif" font-size="28" font-weight="700" fill="#4ade80">14 days</text>
  <text x="760" y="158" font-family="sans-serif" font-size="9" fill="#888">Your best streak yet!</text>
  <!-- Tasks panel -->
  <rect x="220" y="200" width="480" height="380" rx="10" fill="#161616" stroke="#1a1a1a" stroke-width="1" opacity="0.6"/>
  <text x="240" y="230" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Today's Tasks</text>
  <!-- Task 1 -->
  <rect x="240" y="248" width="440" height="50" rx="8" fill="#111" stroke="#4ade80" stroke-width="0.5" opacity="0.5"/>
  <circle cx="262" cy="273" r="10" fill="#4ade80" opacity="0.2" stroke="#4ade80" stroke-width="1"/>
  <text x="282" y="266" font-family="sans-serif" font-size="11" font-weight="600" fill="#fff">Water tomatoes</text>
  <text x="282" y="280" font-family="sans-serif" font-size="9" fill="#888">2.5 gal - 7:00 AM</text>
  <rect x="640" y="260" width="30" height="16" rx="4" fill="#4ade80" opacity="0.2"/>
  <text x="655" y="271" font-family="sans-serif" font-size="8" fill="#4ade80" text-anchor="middle">Done</text>
  <!-- Task 2 -->
  <rect x="240" y="308" width="440" height="50" rx="8" fill="#111" opacity="0.4"/>
  <text x="282" y="326" font-family="sans-serif" font-size="11" font-weight="600" fill="#fff" opacity="0.8">Water basil</text>
  <text x="282" y="340" font-family="sans-serif" font-size="9" fill="#888">1.0 gal - 7:00 AM</text>
  <!-- Task 3 -->
  <rect x="240" y="368" width="440" height="50" rx="8" fill="#111" opacity="0.4"/>
  <text x="282" y="386" font-family="sans-serif" font-size="11" font-weight="600" fill="#fff" opacity="0.8">Water peppers</text>
  <text x="282" y="400" font-family="sans-serif" font-size="9" fill="#888">2.0 gal - 6:30 AM</text>
  <!-- Chart panel -->
  <rect x="720" y="200" width="260" height="380" rx="10" fill="#161616" stroke="#1a1a1a" stroke-width="1" opacity="0.6"/>
  <text x="740" y="230" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Weekly Usage</text>
  <line x1="750" y1="440" x2="960" y2="440" stroke="#333" stroke-width="1"/>
  <rect x="770" y="350" width="25" height="90" rx="3" fill="#4ade80" opacity="0.3"/>
  <rect x="805" y="320" width="25" height="120" rx="3" fill="#4ade80" opacity="0.35"/>
  <rect x="840" y="300" width="25" height="140" rx="3" fill="#4ade80" opacity="0.45"/>
  <rect x="875" y="330" width="25" height="110" rx="3" fill="#4ade80" opacity="0.4"/>
  <rect x="910" y="280" width="25" height="160" rx="3" fill="#4ade80" opacity="0.55"/>
  <text x="782" y="456" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">Mon</text>
  <text x="817" y="456" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">Tue</text>
  <text x="852" y="456" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">Wed</text>
  <text x="887" y="456" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">Thu</text>
  <text x="922" y="456" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">Fri</text>
  <text x="740" y="486" font-family="sans-serif" font-size="9" fill="#4ade80" opacity="0.5">6.2 gal saved this week</text>
</svg>
