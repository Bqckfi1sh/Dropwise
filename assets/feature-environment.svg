  <!-- Large leaf -->
  <g transform="translate(200, 130) rotate(-15)">
    <path d="M0 -80 C40 -60 60 -20 50 30 C40 70 15 90 0 95 C-15 90 -40 70 -50 30 C-60 -20 -40 -60 0 -80Z" fill="url(#envGrad)" opacity="0.3"/>
    <!-- Leaf veins -->
    <line x1="0" y1="-75" x2="0" y2="90" stroke="#4ade80" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-40" x2="30" y2="-20" stroke="#4ade80" stroke-width="0.8" opacity="0.25"/>
    <line x1="0" y1="-10" x2="40" y2="10" stroke="#4ade80" stroke-width="0.8" opacity="0.2"/>
    <line x1="0" y1="20" x2="35" y2="40" stroke="#4ade80" stroke-width="0.8" opacity="0.2"/>
    <line x1="0" y1="-40" x2="-30" y2="-20" stroke="#4ade80" stroke-width="0.8" opacity="0.25"/>
    <line x1="0" y1="-10" x2="-38" y2="10" stroke="#4ade80" stroke-width="0.8" opacity="0.2"/>
    <line x1="0" y1="20" x2="-32" y2="40" stroke="#4ade80" stroke-width="0.8" opacity="0.2"/>
  </g>

  <!-- Heart inside leaf -->
  <g transform="translate(200, 125)" opacity="0.5">
    <path d="M0 12 C-5 6 -12 2 -14 -2 C-16 -6 -14 -10 -10 -10 C-6 -10 -3 -7 0 -3 C3 -7 6 -10 10 -10 C14 -10 16 -6 14 -2 C12 2 5 6 0 12Z" fill="#4ade80" opacity="0.6"/>
  </g>

  <!-- Small floating leaves -->
  <g opacity="0.25">
    <ellipse cx="100" cy="80" rx="12" ry="6" fill="#4ade80" transform="rotate(-30 100 80)"/>
    <line x1="94" y1="83" x2="106" y2="77" stroke="#0a0a0a" stroke-width="0.5" opacity="0.5"/>
  </g>
  <g opacity="0.2">
    <ellipse cx="310" cy="90" rx="10" ry="5" fill="#4ade80" transform="rotate(20 310 90)"/>
  </g>
  <g opacity="0.15">
    <ellipse cx="280" cy="240" rx="8" ry="4" fill="#4ade80" transform="rotate(-20 280 240)"/>
  </g>
  <g opacity="0.2">
    <ellipse cx="120" cy="230" rx="9" ry="4.5" fill="#4ade80" transform="rotate(15 120 230)"/>
  </g>

  <!-- Text -->
  <text x="200" y="265" font-family="sans-serif" font-size="13" font-weight="600" fill="#4ade80" text-anchor="middle" opacity="0.5">Healthier ecosystems</text>
