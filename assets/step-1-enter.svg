  <text x="270" y="162" font-family="sans-serif" font-size="8" fill="#888">Location</text>
  <rect x="270" y="168" width="150" height="24" rx="6" fill="#111" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
  <text x="282" y="184" font-family="sans-serif" font-size="9" fill="#4ade80" opacity="0.6">Austin, TX</text>

  <!-- Sun exposure -->
