  <rect x="80" y="116" width="170" height="24" rx="6" fill="#111" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
  <text x="92" y="132" font-family="sans-serif" font-size="9" fill="#4ade80" opacity="0.6">Tomatoes, Basil, Peppers</text>

  <!-- Soil type field -->
  <text x="270" y="110" font-family="sans-serif" font-size="8" fill="#888">Soil Type</text>
  <rect x="270" y="116" width="150" height="24" rx="6" fill="#111" stroke="#333" stroke-width="1" opacity="0.4"/>
  <text x="282" y="132" font-family="sans-serif" font-size="9" fill="#888">Loamy</text>

  <!-- Garden size field -->
  <text x="80" y="162" font-family="sans-serif" font-size="8" fill="#888">Garden Size</text>
  <rect x="80" y="168" width="170" height="24" rx="6" fill="#111" stroke="#333" stroke-width="1" opacity="0.4"/>
  <text x="92" y="184" font-family="sans-serif" font-size="9" fill="#888">200 sq ft</text>

