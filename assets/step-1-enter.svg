  <rect x="80" y="220" width="80" height="24" rx="6" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/>
  <text x="120" y="236" font-family="sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">Full Sun</text>
  <rect x="170" y="220" width="80" height="24" rx="6" fill="#111" stroke="#333" stroke-width="1" opacity="0.4"/>
  <text x="210" y="236" font-family="sans-serif" font-size="9" fill="#888" text-anchor="middle">Partial</text>

  <!-- Next button -->
  <rect x="330" y="250" width="90" height="28" rx="8" fill="#4ade80" opacity="0.9"/>
  <text x="375" y="268" font-family="sans-serif" font-size="10" font-weight="600" fill="#0a0a0a" text-anchor="middle">Next →</text>
