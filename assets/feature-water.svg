<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="waterGlow"><feGaussianBlur stdDeviation="8" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="400" height="300" fill="#0a0a0a"/>

  <!-- Grid -->
  <g opacity="0.08" fill="#4ade80">
    <circle cx="20" cy="20" r="1"/><circle cx="60" cy="20" r="1"/><circle cx="100" cy="20" r="1"/><circle cx="140" cy="20" r="1"/><circle cx="180" cy="20" r="1"/><circle cx="220" cy="20" r="1"/><circle cx="260" cy="20" r="1"/><circle cx="300" cy="20" r="1"/><circle cx="340" cy="20" r="1"/><circle cx="380" cy="20" r="1"/>
    <circle cx="20" cy="60" r="1"/><circle cx="60" cy="60" r="1"/><circle cx="100" cy="60" r="1"/><circle cx="140" cy="60" r="1"/><circle cx="180" cy="60" r="1"/><circle cx="220" cy="60" r="1"/><circle cx="260" cy="60" r="1"/><circle cx="300" cy="60" r="1"/><circle cx="340" cy="60" r="1"/><circle cx="380" cy="60" r="1"/>
    <circle cx="20" cy="100" r="1"/><circle cx="60" cy="100" r="1"/><circle cx="100" cy="100" r="1"/><circle cx="140" cy="100" r="1"/><circle cx="180" cy="100" r="1"/><circle cx="220" cy="100" r="1"/><circle cx="260" cy="100" r="1"/><circle cx="300" cy="100" r="1"/><circle cx="340" cy="100" r="1"/><circle cx="380" cy="100" r="1"/>
    <circle cx="20" cy="140" r="1"/><circle cx="60" cy="140" r="1"/><circle cx="100" cy="140" r="1"/><circle cx="140" cy="140" r="1"/><circle cx="180" cy="140" r="1"/><circle cx="220" cy="140" r="1"/><circle cx="260" cy="140" r="1"/><circle cx="300" cy="140" r="1"/><circle cx="340" cy="140" r="1"/><circle cx="380" cy="140" r="1"/>
    <circle cx="20" cy="180" r="1"/><circle cx="60" cy="180" r="1"/><circle cx="100" cy="180" r="1"/><circle cx="140" cy="180" r="1"/><circle cx="180" cy="180" r="1"/><circle cx="220" cy="180" r="1"/><circle cx="260" cy="180" r="1"/><circle cx="300" cy="180" r="1"/><circle cx="340" cy="180" r="1"/><circle cx="380" cy="180" r="1"/>
    <circle cx="20" cy="220" r="1"/><circle cx="60" cy="220" r="1"/><circle cx="100" cy="220" r="1"/><circle cx="140" cy="220" r="1"/><circle cx="180" cy="220" r="1"/><circle cx="220" cy="220" r="1"/><circle cx="260" cy="220" r="1"/><circle cx="300" cy="220" r="1"/><circle cx="340" cy="220" r="1"/><circle cx="380" cy="220" r="1"/>
    <circle cx="20" cy="260" r="1"/><circle cx="60" cy="260" r="1"/><circle cx="100" cy="260" r="1"/><circle cx="140" cy="260" r="1"/><circle cx="180" cy="260" r="1"/><circle cx="220" cy="260" r="1"/><circle cx="260" cy="260" r="1"/><circle cx="300" cy="260" r="1"/><circle cx="340" cy="260" r="1"/><circle cx="380" cy="260" r="1"/>
  </g>

  <!-- Glow background -->
  <circle cx="200" cy="130" r="100" fill="rgba(74,222,128,0.06)"/>

  <!-- Ripples -->
  <ellipse cx="200" cy="210" rx="80" ry="12" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.15"/>
  <ellipse cx="200" cy="210" rx="55" ry="8" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.2"/>
  <ellipse cx="200" cy="210" rx="30" ry="5" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.25"/>

  <!-- Small plant -->
  <line x1="200" y1="210" x2="200" y2="150" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="188" cy="160" rx="18" ry="8" fill="#4ade80" opacity="0.4" transform="rotate(-30 188 160)"/>
  <ellipse cx="212" cy="155" rx="18" ry="7" fill="#4ade80" opacity="0.35" transform="rotate(25 212 155)"/>
  <ellipse cx="195" cy="148" rx="14" ry="6" fill="#4ade80" opacity="0.5" transform="rotate(-10 195 148)"/>

  <!-- Main water drop -->
  <g filter="url(#waterGlow)">
    <path d="M200 50 C185 85 155 105 155 135 C155 160 175 180 200 180 C225 180 245 160 245 135 C245 105 215 85 200 50Z" fill="url(#waterGrad)" opacity="0.6"/>
    <!-- Highlight -->
    <ellipse cx="185" cy="115" rx="10" ry="18" fill="#fff" opacity="0.12" transform="rotate(-15 185 115)"/>
  </g>

  <!-- Small floating drops -->
  <path d="M140 75 Q138 85 138 90 Q138 94 140 94 Q142 94 142 90 Q142 85 140 75Z" fill="#4ade80" opacity="0.35"/>
  <path d="M260 90 Q258 100 258 105 Q258 109 260 109 Q262 109 262 105 Q262 100 260 90Z" fill="#4ade80" opacity="0.25"/>
  <path d="M160 60 Q158 68 158 72 Q158 75 160 75 Q162 75 162 72 Q162 68 160 60Z" fill="#4ade80" opacity="0.3"/>
  <path d="M240 65 Q238 73 238 77 Q238 80 240 80 Q242 80 242 77 Q242 73 240 65Z" fill="#4ade80" opacity="0.2"/>

  <!-- Percentage text -->
  <text x="200" y="268" font-family="sans-serif" font-size="16" font-weight="700" fill="#4ade80" text-anchor="middle" opacity="0.7">-40% water</text>
</svg>
